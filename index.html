<!DOCTYPE html>
<html>
<head>

<title>Vehicle Pickup Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  /* Global Styles */
  body{
    font-family:Arial;
    background:#f4f6f8;
    margin:0;
    padding:20px;
  }
  
 .container{
    max-width:1100px;
    margin:auto;
  }
  
 .cards{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  
 .card{
    flex:1;
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    text-align:center;
  }
  
 .card h2{
    font-size:32px;
    margin:0;
  }
  
  button{
    background:#2563eb;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
  }
  
  button:hover{
    background:#1f4e72;
  }
</style>

</head>
<body>

<div class="container">

  <h2>Vehicle Pickup Dashboard</h2>

  <div class="cards">

    <div class="card">
      Vehicle Count
      <h2 id="vehicleCount">0</h2>
    </div>

    <div class="card">
      Service Count
      <h2 id="serviceCount">0</h2>
    </div>

    <button id="addVehicleButton">Add Vehicle</button>
    <button id="deleteVehicleButton">Delete Vehicle</button>
    <button id="serviceVehicleButton">Mark as Picked Up</button>
    <button id="importVehicleButton">Import from Excel</button>

  </div>

  <script>
    // Initialize Supabase
    const supabase = new Supabase('https://your-supabase-endpoint.com', 'your-supabase-key');

    // Get Vehicle Count
    function getVehicleCount() {
      supabase
       .from('vehicles')
       .select('count(*) as count')
       .then(({ data }) => {
          document.getElementById("vehicleCount").innerText = data[0].count;
        });
    }

    // Get Service Count
    function getServiceCount() {
      supabase
       .from('services')
       .select('count(*) as count')
       .then(({ data }) => {
          document.getElementById("serviceCount").innerText = data[0].count;
        });
    }

    // Add Vehicle
    function addVehicle() {
      const vehicleName = prompt("Enter vehicle name");
      const vehicleLocation = prompt("Enter vehicle location");
      supabase
       .from('vehicles')
       .insert([{ name: vehicleName, location: vehicleLocation }])
       .then(({ data }) => {
          alert(`Vehicle added successfully!`);
          getVehicleCount();
          getServiceCount();
        });
    }

    // Delete Vehicle
    function deleteVehicle() {
      const vehicleId = prompt("Enter vehicle ID to delete");
      supabase
       .from('vehicles')
       .delete()
       .match({ id: vehicleId })
       .then(({ data }) => {
          alert(`Vehicle deleted successfully!`);
          getVehicleCount();
          getServiceCount();
        });
    }

    // Service Vehicle
    function serviceVehicle() {
      const vehicleId = prompt("Enter vehicle ID to service");
      supabase
       .from('services')
       .insert([{ vehicle_id: vehicleId, status: "Picked Up" }])
       .then(({ data }) => {
          alert(`Vehicle serviced successfully!`);
          getVehicleCount();
          getServiceCount();
        });
    }

    // Import Vehicles from Excel
    function importVehicles() {
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
      fileInput.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const vehicles = workbook.Sheets['Sheet1'];
          supabase
           .from('vehicles')
           .insert(vehicles)
           .then(({ data }) => {
              alert(`Vehicles imported successfully!`);
              getVehicleCount();
              getServiceCount();
            });
        };
        reader.readAsArrayBuffer(file);
      };
      fileInput.click();
    }

    // Initialize Vehicle Count
    getVehicleCount();
    getServiceCount();

    // Add Event Listeners
    document.getElementById("addVehicleButton").addEventListener("click", addVehicle);
    document.getElementById("deleteVehicleButton").addEventListener("click", deleteVehicle);
    document.getElementById("serviceVehicleButton").addEventListener("click", serviceVehicle);
    document.getElementById("importVehicleButton").addEventListener("click", importVehicles);
  </script>

</div>

</body>
</html>
