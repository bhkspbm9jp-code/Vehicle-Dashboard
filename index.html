<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Pickup Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Supabase JavaScript library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1.4.1/dist/supabase.min.js"></script>

  <!-- XLSX library for Excel import -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* Basic styling to match your desired layout */
    body {
      font-family: Arial, sans-serif;
    }
   .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vehicle Pickup Dashboard</h1>
    <p>Counts per location:</p>
    <div id="location-counts"></div>
    <form id="vehicle-form">
      <label for="make">Make:</label>
      <input type="text" id="make" name="make"><br><br>
      <label for="model">Model:</label>
      <input type="text" id="model" name="model"><br><br>
      <label for="customer">Customer:</label>
      <input type="text" id="customer" name="customer"><br><br>
      <label for="vin">VIN:</label>
      <input type="text" id="vin" name="vin"><br><br>
      <label for="turn-in-date">Turn-in Date:</label>
      <input type="date" id="turn-in-date" name="turn-in-date"><br><br>
      <label for="location">Location:</label>
      <input type="text" id="location" name="location"><br><br>
      <button type="submit">Add Vehicle</button>
    </form>
    <table id="vehicle-table">
      <thead>
        <tr>
          <th>Make</th>
          <th>Model</th>
          <th>Customer</th>
          <th>VIN</th>
          <th>Turn-in Date</th>
          <th>Location</th>
        </tr>
      </thead>
      <tbody id="vehicle-table-body">
      </tbody>
    </table>
  </div>

  <script>
    // Initialize Supabase
    const supabaseUrl = 'https://your-supabase-instance.supabase.io';
    const supabaseKey = sb_publishable_ogg53YFtX-817uwdhSKNaw_Oi7kCoya;
    const supabaseSecret = 'your-supabase-secret';
    const supabase = createClient(supabaseUrl, supabaseKey, supabaseSecret);

    // Get location counts
    async function getLocations() {
      const { data, error } = await supabase
       .from('locations')
       .select('count(*) as count');
      if (error) {
        console.error(error);
      } else {
        const locationCounts = data.reduce((acc, location) => {
          acc[location.count] = location.count;
          return acc;
        }, {});
        const locationCountHtml = Object.keys(locationCounts).map((count) => {
          return `<p>Location ${count}: ${locationCounts[count]}</p>`;
        }).join('');
        document.getElementById('location-counts').innerHTML = locationCountHtml;
      }
    }

    // Handle form submission
    document.getElementById('vehicle-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const vehicleData = Object.fromEntries(form.entries());
      try {
        // Insert new vehicle into Supabase
        const { data, error } = await supabase
         .from('vehicles')
         .insert(vehicleData);
        if (error) {
          console.error(error);
        } else {
          // Add vehicle to table
          const vehicleHtml = `
            <tr>
              <td>${vehicleData.make}</td>
              <td>${vehicleData.model}</td>
              <td>${vehicleData.customer}</td>
              <td>${vehicleData.vin}</td>
              <td>${vehicleData.turn_in_date}</td>
              <td>${vehicleData.location}</td>
            </tr>
          `;
          const tableBody = document.getElementById('vehicle-table-body');
          tableBody.innerHTML += vehicleHtml;
          // Update location counts
          await getLocations();
        }
      } catch (error) {
        console.error(error);
      }
    });

    // Get location counts on page load
    getLocations();
  </script>
</body>
</html>
